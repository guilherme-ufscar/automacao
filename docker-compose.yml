services:
  postgres:
    image: postgres:16-alpine
    container_name: alcantara_postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alcantara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_segura_aqui}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB:-alcantara},wuzapi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alcantara}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alcantara_net

  wuzapi:
    image: asternic/wuzapi:latest
    container_name: alcantara_wuzapi
    restart: unless-stopped
    ports:
      - "${PORT_EVOLUTION:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DBUSER: ${POSTGRES_USER:-alcantara}
      DBPASSWORD: ${POSTGRES_PASSWORD:-senha_segura_aqui}
      DBNAME: wuzapi
      DBHOST: postgres
      DBPORT: "5432"
      WUZAPI_ADMIN_TOKEN: ${EVOLUTION_API_KEY:-chave_evolution_aqui}
      WUZAPI_GLOBAL_WEBHOOK: http://agent:3000/webhook
      WEBHOOK_FORMAT: json
      LOGTYPE: json
    volumes:
      - wuzapi_data:/app/files
    networks:
      - alcantara_net

  agent:
    build: ./agent
    container_name: alcantara_agent
    restart: unless-stopped
    ports:
      - "${PORT_AGENT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      wuzapi:
        condition: service_started
    env_file:
      - ./agent/.env
    networks:
      - alcantara_net

  crm:
    build: ./crm
    container_name: alcantara_crm
    restart: unless-stopped
    ports:
      - "${PORT_CRM:-7919}:7919"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./agent/.env
    environment:
      PORT: 7919
    networks:
      - alcantara_net

volumes:
  postgres_data:
  wuzapi_data:

networks:
  alcantara_net:
    driver: bridge
