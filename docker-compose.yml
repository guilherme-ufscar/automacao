services:
  postgres:
    image: postgres:16-alpine
    container_name: alcantara_postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alcantara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_segura_aqui}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB:-alcantara},evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alcantara}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alcantara_net

  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: alcantara_evolution
    restart: unless-stopped
    ports:
      - "${PORT_EVOLUTION:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_URL: https://evolution.codermaster.com.br
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-chave_evolution_aqui}
      # Database
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-alcantara}:${POSTGRES_PASSWORD:-senha_segura_aqui}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      # Cache — Redis desabilitado, usa cache local
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      # Webhook
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://agent:3000/webhook
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1026080446"
      CONFIG_SESSION_PHONE_CLIENT: "Chrome"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - alcantara_net

  agent:
    build: ./agent
    container_name: alcantara_agent
    restart: unless-stopped
    ports:
      - "${PORT_AGENT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      evolution:
        condition: service_started
    env_file:
      - ./agent/.env
    networks:
      - alcantara_net

volumes:
  postgres_data:
  evolution_data:

networks:
  alcantara_net:
    driver: bridge
