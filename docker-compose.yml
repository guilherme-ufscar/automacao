version: '3.8'

# As variáveis PORT_AGENT, PORT_EVOLUTION e PORT_POSTGRES
# controlam qual porta do HOST será mapeada para cada serviço.
# A comunicação interna entre containers usa sempre as portas fixas
# (5432, 8080, 3000) — isso nunca muda.

services:
  postgres:
    image: postgres:16-alpine
    container_name: alcantara_postgres
    restart: unless-stopped
    ports:
      - "${PORT_POSTGRES:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alcantara}
      POSTGRES_USER: ${POSTGRES_USER:-alcantara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_segura_aqui}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alcantara}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alcantara_net

  evolution:
    image: atendai/evolution-api:latest
    container_name: alcantara_evolution
    restart: unless-stopped
    ports:
      - "${PORT_EVOLUTION:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_URL: http://evolution:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-chave_evolution_aqui}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-alcantara}:${POSTGRES_PASSWORD:-senha_segura_aqui}@postgres:5432/${POSTGRES_DB:-alcantara}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://agent:3000/webhook
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      DEL_INSTANCE: "false"
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - alcantara_net

  agent:
    build: ./agent
    container_name: alcantara_agent
    restart: unless-stopped
    ports:
      - "${PORT_AGENT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      evolution:
        condition: service_started
    env_file:
      - ./agent/.env
    networks:
      - alcantara_net

volumes:
  postgres_data:
  evolution_data:

networks:
  alcantara_net:
    driver: bridge
