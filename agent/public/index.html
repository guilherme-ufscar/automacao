<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alcântara — Painel de Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a1628;
      --surface: #111e35;
      --surface2: #172540;
      --accent: #a3e635;
      --accent-dim: #7ab82a;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #1e3050;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --gray: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    .stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .stats span b { color: var(--text); }

    .filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-shrink: 0;
    }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    select:focus { outline: 1px solid var(--accent); }

    .filters label { font-size: 13px; color: var(--text-muted); }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .lead-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .lead-item:hover { background: var(--surface2); }
    .lead-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }

    .lead-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .lead-phone { font-size: 14px; font-weight: 500; }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      text-transform: capitalize;
    }

    .badge.quente { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.morno  { background: rgba(234,179,8,0.15);  color: var(--yellow); }
    .badge.frio   { background: rgba(239,68,68,0.15);  color: var(--red); }
    .badge.novo   { background: rgba(100,116,139,0.15); color: var(--gray); }

    .lead-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
    }

    .seg-tag {
      background: rgba(163,230,53,0.1);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* Chat panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-header h2 { font-size: 15px; font-weight: 600; }
    .chat-header .meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .status-select {
      font-size: 12px;
      padding: 4px 10px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.user {
      background: var(--surface2);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.assistant {
      background: rgba(163,230,53,0.12);
      border: 1px solid rgba(163,230,53,0.2);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>🏡 Alcântara — Painel de Leads</h1>
  <div class="stats" id="stats">
    <span>Total: <b id="st-total">—</b></span>
    <span>🟢 <b id="st-quente">0</b></span>
    <span>🟡 <b id="st-morno">0</b></span>
    <span>🔴 <b id="st-frio">0</b></span>
  </div>
</header>

<div class="filters">
  <label>Status:</label>
  <select id="f-status" onchange="applyFilters()">
    <option value="">Todos</option>
    <option value="novo">Novo</option>
    <option value="quente">Quente</option>
    <option value="morno">Morno</option>
    <option value="frio">Frio</option>
  </select>
  <label>Segmento:</label>
  <select id="f-segment" onchange="applyFilters()">
    <option value="">Todos</option>
    <option value="mcmv">Minha Casa Minha Vida</option>
    <option value="leilao">Leilão</option>
    <option value="regularizacao">Regularização</option>
    <option value="desconhecido">Desconhecido</option>
  </select>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="empty">Carregando leads...</div>
  </div>
  <div class="chat-panel" id="chat-panel">
    <div class="empty">Selecione um lead para ver a conversa</div>
  </div>
</div>

<script>
  let currentPhone = null;
  const SEG_LABELS = { mcmv: 'MCMV', leilao: 'Leilão', regularizacao: 'Regularização', desconhecido: '?' };

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  async function loadStats() {
    try {
      const r = await fetch('/api/stats');
      const s = await r.json();
      document.getElementById('st-total').textContent = s.total || 0;
      document.getElementById('st-quente').textContent = (s.porStatus && s.porStatus.quente) || 0;
      document.getElementById('st-morno').textContent = (s.porStatus && s.porStatus.morno) || 0;
      document.getElementById('st-frio').textContent = (s.porStatus && s.porStatus.frio) || 0;
    } catch (e) {}
  }

  async function loadLeads() {
    const status = document.getElementById('f-status').value;
    const segment = document.getElementById('f-segment').value;
    let url = '/api/leads?limit=50';
    if (status) url += '&status=' + status;
    if (segment) url += '&segment=' + segment;

    const r = await fetch(url);
    const leads = await r.json();
    renderSidebar(leads);
  }

  function renderSidebar(leads) {
    const el = document.getElementById('sidebar');
    if (!leads.length) {
      el.innerHTML = '<div class="empty" style="padding:20px;color:#64748b">Nenhum lead encontrado</div>';
      return;
    }
    el.innerHTML = leads.map(l => `
      <div class="lead-item ${l.phone === currentPhone ? 'active' : ''}" onclick="selectLead('${l.phone}')">
        <div class="lead-top">
          <span class="lead-phone">${l.phone}</span>
          <span class="badge ${l.status || 'novo'}">${l.status || 'novo'}</span>
        </div>
        <div class="lead-meta">
          <span class="seg-tag">${SEG_LABELS[l.segment] || l.segment}</span>
          <span>${fmtDate(l.updated_at)}</span>
        </div>
      </div>
    `).join('');
  }

  async function selectLead(phone) {
    currentPhone = phone;
    document.querySelectorAll('.lead-item').forEach(el => {
      el.classList.toggle('active', el.onclick.toString().includes(`'${phone}'`));
    });

    const r = await fetch(`/api/leads/${phone}`);
    const lead = await r.json();
    renderChat(lead);
  }

  function renderChat(lead) {
    const panel = document.getElementById('chat-panel');
    const segLabel = SEG_LABELS[lead.segment] || lead.segment;
    const msgs = (lead.messages || []).map(m => `
      <div class="msg ${m.role}">
        <div>${escapeHtml(m.content)}</div>
        <div class="msg-time">${fmtDate(m.created_at)}</div>
      </div>
    `).join('');

    panel.innerHTML = `
      <div class="chat-header">
        <div>
          <h2>${lead.phone}</h2>
          <div class="meta">Segmento: ${segLabel} &nbsp;|&nbsp; Criado em: ${fmtDate(lead.created_at)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="badge ${lead.status || 'novo'}">${lead.status || 'novo'}</span>
          <select class="status-select" onchange="updateStatus('${lead.phone}', this.value)">
            <option value="">Alterar status...</option>
            <option value="quente">Quente</option>
            <option value="morno">Morno</option>
            <option value="frio">Frio</option>
            <option value="novo">Novo</option>
          </select>
        </div>
      </div>
      <div class="messages" id="msg-list">
        ${msgs || '<div class="empty">Sem mensagens ainda</div>'}
      </div>
    `;

    const list = document.getElementById('msg-list');
    if (list) list.scrollTop = list.scrollHeight;
  }

  async function updateStatus(phone, status) {
    if (!status) return;
    await fetch(`/api/leads/${phone}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    await loadLeads();
    await selectLead(phone);
  }

  function applyFilters() {
    loadLeads();
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  // Init
  loadStats();
  loadLeads();

  // Atualização automática a cada 30s
  setInterval(() => {
    loadStats();
    loadLeads();
    if (currentPhone) selectLead(currentPhone);
  }, 30000);
</script>
</body>
</html>
